services:
  - type: web
    name: strokenova
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd backend && gunicorn app:create_app() --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: strokenova_db
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
